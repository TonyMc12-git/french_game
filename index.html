<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>French Game</title>
  <meta name="theme-color" content="#113250">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="French Game">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest?v=20260423-french8">
  <link rel="icon" href="favicon-192.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260423-french8">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="apple-touch-icon.png?v=20260423-french8">
  <link rel="stylesheet" href="styles.css?v=20260423-french8">
</head>
<body>
  <main class="app-shell">
    <section class="game-panel" aria-live="polite">
      <header class="top-bar">
        <div class="title-block">
          <h1>French Game</h1>
          <div class="player-stats" aria-label="Points and timer">
            <span><em>Pts</em> <strong id="points-score">0</strong></span>
            <span><em>Time</em> <strong id="round-timer">000.0s</strong></span>
            <span><em>Best</em> <strong id="high-score">0</strong></span>
            <button class="end-game-button" id="new-game-button" type="button">New game</button>
          </div>
        </div>
        <div class="top-actions">
          <div class="score-card">
            <span class="score-label">Score</span>
            <strong id="score">0 / 0</strong>
            <span class="score-context" id="score-context">of 0 phrases</span>
          </div>
        </div>
      </header>

      <div class="prompt-stage">
        <div class="prompt-card" aria-label="French prompt">
          <span class="prompt-kicker">French</span>
          <strong class="prompt-title" id="prompt-text">Loading...</strong>
        </div>
      </div>

      <div class="options-grid" id="options-grid" aria-label="English choices"></div>
    </section>
  </main>

  <div class="celebration" id="celebration" aria-live="assertive" aria-hidden="true">
    <div class="celebration-card">
      <span class="celebration-kicker" id="celebration-kicker"></span>
      <strong class="celebration-title" id="celebration-title"></strong>
      <span class="celebration-copy" id="celebration-copy"></span>
      <button class="celebration-button" id="celebration-button" type="button">OK</button>
    </div>
  </div>

  <div class="bonus-toast" id="bonus-toast" aria-live="assertive" aria-hidden="true"></div>

  <script src="app.js?v=20260423-french8"></script>
</body>
</html>
